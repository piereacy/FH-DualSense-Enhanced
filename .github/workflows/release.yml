name: release

# Triggers:
#   - tag RN or commit msg contains "release RN" -> stable R-series release
#   - tag vX.Y.Z or vX.Y.Z.postN                  -> legacy stable release
#   - legacy "release vX.Y.Z[.postN]" commits     -> legacy stable release
#   - commit msg contains "prerelease" or manual dispatch -> rolling RN-preview

on:
  push:
    branches: [main, dev]
    tags: ["R*", "v*.*.*"]
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish
        required: true
        default: preview
        type: choice
        options:
          - preview
          - stable

permissions:
  contents: write

jobs:
  # MARK: parse trigger + move rolling tag --------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse.outputs.tag }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
      title: ${{ steps.parse.outputs.title }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Parse trigger
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          set -e
          tag=""; prerelease=""; title=""
          msg=$(git log -1 --pretty=%s)
          internal=$(sed -n 's/^version = "\([^"]*\)"/\1/p' src/pyproject.toml | head -1)
          if [[ ! "$internal" =~ ^[0-9]+$ ]]; then
            echo "Expected a numeric internal project version, got: $internal" >&2
            exit 1
          fi
          release="R$internal"

          if [[ "$GITHUB_REF" =~ ^refs/tags/(R[0-9]+)$ ]]; then
            # R-series tag push -> stable
            tag="${BASH_REMATCH[1]}"; prerelease=false
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # legacy tag push -> stable
            tag="${GITHUB_REF#refs/tags/}"; prerelease=false; title="$tag"
          elif [[ "$msg" =~ release[[:space:]]+(R[0-9]+) ]]; then
            # explicit R-series stable release commit
            tag="${BASH_REMATCH[1]}"; prerelease=false
          elif [[ "$msg" =~ release[[:space:]]+(v[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?) ]]; then
            # explicit legacy stable release commit
            tag="${BASH_REMATCH[1]}"; prerelease=false; title="$tag"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "$RELEASE_CHANNEL" == "stable" ]]; then
            # explicit manual recovery path when repository push events are unavailable
            tag="$release"; prerelease=false
          elif [[ "$msg" == *prerelease* || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # rolling prerelease for the current R-series version
            tag="${release}-preview"
            prerelease=true; title="FH-DualSense-Enhanced ${release} Preview"
          fi

          if [[ "$tag" =~ ^R[0-9]+$ ]]; then
            title="FH-DualSense-Enhanced $tag"
          elif [[ "$tag" == "v1.6.2.post1" ]]; then
            title="FH-DualSense-Enhanced 1.6.2 Enhanced R1"
          elif [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\.post([0-9]+)$ ]]; then
            title="FH-DualSense-Enhanced ${BASH_REMATCH[1]} Enhanced R${BASH_REMATCH[2]}"
          fi

          echo "tag=$tag"               >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "title=$title"           >> "$GITHUB_OUTPUT"

      - name: Move rolling tag
        if: steps.parse.outputs.tag && steps.parse.outputs.prerelease == 'true'
        env:
          TAG: ${{ steps.parse.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

  # MARK: zuv bundle ------------------------------------------------------
  bundle:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build zuv bundle
        run: |
          mkdir -p release
          uvx zuv build src -o release/FH-DualSense-Enhanced.zuv.py \
            --update-repo "$GITHUB_REPOSITORY"
          cp win_start.bat linux_start.sh LICENSE docs/THIRD_PARTY_NOTICES.md release/

      - uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: release/

  # MARK: Windows standalone EXE -----------------------------------------
  exe:
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build FH-DualSense-Enhanced EXE
        shell: pwsh
        run: |
          & "$Env:GITHUB_WORKSPACE\packaging\windows\build_exe.bat"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: |
            packaging/windows/dist/FH-DualSense-Enhanced-*.exe
            packaging/windows/dist/FH-DualSense-Enhanced-*.exe.sha256

  # MARK: Linux standalone ELF -------------------------------------------
  elf:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      # AppIndicator/GTK so the pystray tray works in the frozen build.
      - name: Install system tray libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-ayatanaappindicator3-0.1 \
            python3-gi gir1.2-gtk-3.0 libportaudio2

      - name: Build FH-DualSense-Enhanced (ELF)
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          uvx --from "pyinstaller>=6.11.1" \
              --with customtkinter --with textual \
              --with hidapi --with psutil --with dotenv \
              --with pystray --with pillow \
              --with numpy --with sounddevice \
              pyinstaller "$GITHUB_WORKSPACE/packaging/linux/fhds.spec" \
              --distpath "$GITHUB_WORKSPACE/packaging/linux/dist" \
              --workpath "$GITHUB_WORKSPACE/packaging/linux/build" \
              --noconfirm --clean
          mv "$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense-Enhanced" \
             "$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense-Enhanced-$tag"
          echo "Built packaging/linux/dist/FH-DualSense-Enhanced-$tag"

      - uses: actions/upload-artifact@v4
        with:
          name: elf
          path: packaging/linux/dist/FH-DualSense-Enhanced-*

  # MARK: combined release -----------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [prepare, bundle, exe, elf]
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bundle
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: exe
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: elf
          path: release/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.title }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## Enhanced R4 中文说明

            Enhanced R4 将界面统一为初音未来青绿色的 `Miku Console`，只提供一个标准 Windows EXE。驾驶反馈页改为可滚动和响应式布局，在 Windows 100%、125% 与 150% 显示缩放下都能查看完整卡片；鼠标滚轮会跟随指针所在的滚动区域，嵌套页面到达边界后再交给外层滚动。

            `Default` 配置现在会自动保存并跨重启保留。关闭窗口、托盘退出、游戏关闭和更新重启都会使用同一退出流程：本会话修改过 `Default` 的手感参数时，可保存为默认填入 `profile1`、`profile2` 的命名配置后退出，也可直接退出或取消。恢复出厂设置会保留命名配置，重置全部手感和系统设置，并重新检测 Windows 显示语言。首次启动同样会自动选择支持的系统语言，之后仍可手动切换。

            “系统与更新”旁会在发现、下载、校验、待安装或带 Release 信息的错误状态下显示白点；打开页面不会清除提醒。内置更新器只接受规范资产 `${{ format('FH-DualSense-Enhanced-{0}.exe', needs.prepare.outputs.tag) }}` 及其 SHA-256，不再区分界面方案。

            Windows 独立 EXE 可以在“系统与更新”中检查更新、选择后台下载、显示进度，并在用户确认后重启安装。更新助手等待主程序退出后替换文件，失败时恢复 `.old`。ZUV 和启动脚本继续作为网络或 Linux 环境下的备用安装方式，不再是 Windows EXE 更新的必要条件。

            红线握把反馈改为非线性感知增益，默认强度提高到 `220/255`，low 比例提高到 `45%`，脉冲宽度提高到 `70%`，并加入可调的进入冲击。默认关闭 R2 扳机键红线、开启握把红线；握把默认仍在左侧。可选握把换挡冲击继续默认关闭。

            新增的可选功能默认全部关闭，避免改变既有 Profile 手感：涡轮增压 R2 扳机键阻力、横纵向 G 力 R2 扳机键阻力、L2/R2 独立碰撞冲击、松开扳机键时的路面与减速带纹理、转速灯条和挡位 Player LEDs。每项都可独立开关和调节。碰撞检测由扳机与握把共享同一个事件，避免同一遥测帧被重复判定。

            USB 与 Bluetooth 继续使用同一套左右 PCM 语义。Bluetooth `0x36` 路径增加 soft limiter 和带误差反馈的 int8 量化器，尽量保留低幅路面细节和叠加瞬态；灯条和 Player LEDs 同样写入 USB、Bluetooth `0x31` 与 Bluetooth HD haptics `0x36` 的状态区。如果当前连接拒绝 `0x36`，程序仍会回退到 compatible rumble，扳机不受影响。

            Enhanced R4 基于 Forza-Horizon-DualSense-Python 1.6.2，参考 HorizonHaptics 1.3.0，并使用 vDS 0.3.0-rc7 与 DS5Dongle 作为 Bluetooth HD haptics 协议参考。历史 Enhanced R1 使用 `1.6.2.post1`；从 Enhanced R2 起使用独立 R 版本体系。

            ## Windows 独立 EXE（推荐）

            下载：`${{ format('FH-DualSense-Enhanced-{0}.exe', needs.prepare.outputs.tag) }}`

            EXE 已包含 Python 和全部依赖，不需要 BAT、ZUV、uv 或本机 Python。请把对应 `.sha256` 文件留在 Release 中供内置更新器校验；用户手动启动 EXE 时不需要同时下载 `.sha256`。

            ## Enhanced R4 highlights

            Enhanced R4 uses one Miku Console GUI and one canonical Windows executable. It adds responsive scrolling, persistent Default autosave, a named-profile exit prompt, full factory restore, first-run system-language detection, and a persistent update badge. The updater keeps SHA-256 verification, restart replacement, and rollback.

            New opt-in effects include turbo and G-force R2-trigger resistance, independent L2/R2 collision jolts, idle-trigger road texture, a tachometer lightbar, and gear Player LEDs. Bluetooth HD haptics now uses soft limiting and error-feedback int8 quantization to retain more low-level detail. All new effects are disabled by default and do not remove existing traction, GT7-style ABS wall, material bands, grip haptics, or compatible fallback behavior.

            ## ZUV / Linux 备用方式

            Windows 可下载 `win_start.bat`，Linux 可下载 `linux_start.sh`。启动器下载 `FH-DualSense-Enhanced.zuv.py`，Windows 启动器在需要时安装 `uv`。网络不稳定时，也可以手动下载 ZUV 本体并放到启动器旁边。Linux 独立文件为 `${{ format('FH-DualSense-Enhanced-{0}', needs.prepare.outputs.tag) }}`；内置 EXE 更新只支持 Windows 冻结版本。

            ## 必要设置

            启用 Steam Input 和 DualSense vibration，然后在 Forza Horizon 中开启 Data Out，IP 设为 `127.0.0.1`、端口设为 `5300`。先启动 FH-DualSense-Enhanced，再启动游戏。收不到 UDP 时，请在防火墙中允许应用和 UDP 5300；只在短暂排查时关闭防火墙，随后立即恢复。验证本项目的方向碰撞时，关闭游戏内振动可避免 Steam Input 原生 rumble 掩盖左右差异。本项目仍不会接管或完整复现菜单、CG 和上车过场的游戏原生振动。

            ---
            > - 设置保存在程序旁边的 `data/user_preferences.json`，更新后继续保留。
            > - Linux 启动器不会安装 udev 规则。HID 权限不足时，请下载 [`70-dualsense.rules`](https://github.com/piereacy/FH-DualSense-Enhanced/blob/main/packaging/linux/70-dualsense.rules)，复制到 `/etc/udev/rules.d/`，重新载入规则后连接手柄。
            > - 预发布频道仍可通过 `uv run FH-DualSense-Enhanced.zuv.py --prerelease` 跟踪。
          files: release/*

