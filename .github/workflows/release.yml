name: release

# Triggers:
#   - tag RN or commit msg contains "release RN" -> stable R-series release
#   - tag vX.Y.Z or vX.Y.Z.postN                  -> legacy stable release
#   - legacy "release vX.Y.Z[.postN]" commits     -> legacy stable release
#   - commit msg contains "prerelease" or manual dispatch -> rolling RN-preview

on:
  push:
    branches: [main, dev]
    tags: ["R*", "v*.*.*"]
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish
        required: true
        default: preview
        type: choice
        options:
          - preview
          - stable

permissions:
  contents: write

jobs:
  # MARK: parse trigger + move rolling tag --------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse.outputs.tag }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
      title: ${{ steps.parse.outputs.title }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Parse trigger
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          set -e
          tag=""; prerelease=""; title=""
          msg=$(git log -1 --pretty=%s)
          internal=$(sed -n 's/^version = "\([^"]*\)"/\1/p' src/pyproject.toml | head -1)
          if [[ ! "$internal" =~ ^[0-9]+$ ]]; then
            echo "Expected a numeric internal project version, got: $internal" >&2
            exit 1
          fi
          release="R$internal"

          if [[ "$GITHUB_REF" =~ ^refs/tags/(R[0-9]+)$ ]]; then
            # R-series tag push -> stable
            tag="${BASH_REMATCH[1]}"; prerelease=false
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # legacy tag push -> stable
            tag="${GITHUB_REF#refs/tags/}"; prerelease=false; title="$tag"
          elif [[ "$msg" =~ release[[:space:]]+(R[0-9]+) ]]; then
            # explicit R-series stable release commit
            tag="${BASH_REMATCH[1]}"; prerelease=false
          elif [[ "$msg" =~ release[[:space:]]+(v[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?) ]]; then
            # explicit legacy stable release commit
            tag="${BASH_REMATCH[1]}"; prerelease=false; title="$tag"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "$RELEASE_CHANNEL" == "stable" ]]; then
            # explicit manual recovery path when repository push events are unavailable
            tag="$release"; prerelease=false
          elif [[ "$msg" == *prerelease* || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # rolling prerelease for the current R-series version
            tag="${release}-preview"
            prerelease=true; title="FH-DualSense-Enhanced ${release} Preview"
          fi

          if [[ "$tag" =~ ^R[0-9]+$ ]]; then
            title="FH-DualSense-Enhanced $tag"
          elif [[ "$tag" == "v1.6.2.post1" ]]; then
            title="FH-DualSense-Enhanced 1.6.2 Enhanced R1"
          elif [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\.post([0-9]+)$ ]]; then
            title="FH-DualSense-Enhanced ${BASH_REMATCH[1]} Enhanced R${BASH_REMATCH[2]}"
          fi

          echo "tag=$tag"               >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "title=$title"           >> "$GITHUB_OUTPUT"

      - name: Move rolling tag
        if: steps.parse.outputs.tag && steps.parse.outputs.prerelease == 'true'
        env:
          TAG: ${{ steps.parse.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

  # MARK: zuv bundle ------------------------------------------------------
  bundle:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build zuv bundle
        run: |
          mkdir -p release
          uvx zuv build src -o release/FH-DualSense-Enhanced.zuv.py \
            --update-repo "$GITHUB_REPOSITORY"
          cp win_start.bat linux_start.sh LICENSE docs/THIRD_PARTY_NOTICES.md release/

      - uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: release/

  # MARK: Windows standalone EXE -----------------------------------------
  exe:
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build FH-DualSense-Enhanced EXE
        shell: pwsh
        run: |
          & "$Env:GITHUB_WORKSPACE\packaging\windows\build_exe.bat"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify EXE checksum sidecar
        shell: pwsh
        run: |
          $files = @(Get-ChildItem "$Env:GITHUB_WORKSPACE\packaging\windows\dist\FH-DualSense-Enhanced-R*.exe")
          if ($files.Count -ne 1) { throw "Expected one canonical R-series EXE, found $($files.Count)" }
          uv run --no-project python "$Env:GITHUB_WORKSPACE\packaging\windows\write_sha256.py" --check $files[0].FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: |
            packaging/windows/dist/FH-DualSense-Enhanced-*.exe
            packaging/windows/dist/FH-DualSense-Enhanced-*.exe.sha256

  # MARK: Linux standalone ELF -------------------------------------------
  elf:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      # AppIndicator/GTK so the pystray tray works in the frozen build.
      - name: Install system tray libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-ayatanaappindicator3-0.1 \
            python3-gi gir1.2-gtk-3.0 libportaudio2

      - name: Build FH-DualSense-Enhanced (ELF)
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          uvx --from "pyinstaller>=6.11.1" \
              --with customtkinter --with textual \
              --with hidapi --with psutil --with dotenv \
              --with pystray --with pillow \
              --with numpy --with sounddevice \
              pyinstaller "$GITHUB_WORKSPACE/packaging/linux/fhds.spec" \
              --distpath "$GITHUB_WORKSPACE/packaging/linux/dist" \
              --workpath "$GITHUB_WORKSPACE/packaging/linux/build" \
              --noconfirm --clean
          mv "$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense-Enhanced" \
             "$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense-Enhanced-$tag"
          echo "Built packaging/linux/dist/FH-DualSense-Enhanced-$tag"

      - uses: actions/upload-artifact@v4
        with:
          name: elf
          path: packaging/linux/dist/FH-DualSense-Enhanced-*

  # MARK: combined release -----------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [prepare, bundle, exe, elf]
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bundle
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: exe
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: elf
          path: release/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.title }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## Enhanced R4 中文说明

            Enhanced R4 将界面统一为单一响应式桌面前端，只提供一个标准 Windows EXE。驾驶反馈页改为可滚动和响应式布局，以适应常见显示缩放与窗口尺寸；鼠标滚轮会跟随指针所在的滚动区域，嵌套页面到达边界后再交给外层滚动。“关于与许可证”已从握把触觉设置中移到日志下方的独立页面，原来没有实际功能的 R4 工作台已删除；窗口标题和 Windows 文件描述统一只使用 `FH-DualSense-Enhanced`。

            `Default` 配置现在会自动保存并跨重启保留。关闭窗口、托盘退出、游戏关闭和更新重启都会使用同一退出流程：本会话修改过 `Default` 的手感参数时，可保存为默认填入 `profile1`、`profile2` 的命名配置后退出，也可直接退出或取消。恢复出厂设置会保留命名配置，重置全部手感和系统设置，并重新检测 Windows 显示语言。首次启动同样会自动选择支持的系统语言，之后仍可手动切换。

            “系统与更新”旁会在发现、下载、校验、待安装或带 Release 信息的错误状态下显示白点；打开页面不会清除提醒。内置更新器只接受规范资产 `${{ format('FH-DualSense-Enhanced-{0}.exe', needs.prepare.outputs.tag) }}` 及其 SHA-256，不再区分界面方案。

            Windows 独立 EXE 可以在“系统与更新”中检查更新、选择后台下载、显示进度，并在用户确认后重启安装。更新助手等待主程序退出后替换文件，失败时恢复 `.old`。ZUV 和启动脚本继续作为网络或 Linux 环境下的备用安装方式，不再是 Windows EXE 更新的必要条件。

            红线握把反馈改为非线性感知增益，默认强度提高到 `220/255`，low 比例提高到 `45%`，脉冲宽度提高到 `70%`，并加入可调的进入冲击。默认关闭 R2 扳机键红线、开启握把红线；握把默认仍在左侧。可选握把换挡冲击继续默认关闭。

            新增的实验性扳机功能默认全部关闭，避免改变既有 Profile 手感：涡轮增压 R2 扳机键阻力、横纵向 G 力 R2 扳机键阻力、L2/R2 独立碰撞冲击、松开扳机键时的路面与减速带纹理。它们连同全部参数统一收纳在默认折叠的“实验性功能”中。转速灯条和挡位 Player LEDs 同样默认关闭，但保留在独立灯光页面。碰撞检测由扳机与握把共享同一个事件，避免同一遥测帧被重复判定。

            USB 与 Bluetooth 继续使用同一套左右 PCM 语义。Bluetooth `0x36` 路径增加 soft limiter 和带误差反馈的 int8 量化器，尽量保留低幅路面细节和叠加瞬态；灯条和 Player LEDs 同样写入 USB、Bluetooth `0x31` 与 Bluetooth HD haptics `0x36` 的状态区。如果当前连接拒绝 `0x36`，程序仍会回退到 compatible rumble，扳机不受影响。

            Enhanced R4 基于 Forza-Horizon-DualSense-Python 1.6.2，参考 HorizonHaptics 1.3.0，并使用 vDS 0.3.0-rc7 与 DS5Dongle 作为 Bluetooth HD haptics 协议参考。历史 Enhanced R1 使用 `1.6.2.post1`；从 Enhanced R2 起使用独立 R 版本体系。

            ## Windows 独立 EXE（推荐）

            下载：`${{ format('FH-DualSense-Enhanced-{0}.exe', needs.prepare.outputs.tag) }}`

            EXE 已包含 Python 和全部依赖，不需要 BAT、ZUV、uv 或本机 Python。请把对应 `.sha256` 文件留在 Release 中供内置更新器校验；用户手动启动 EXE 时不需要同时下载 `.sha256`。

            ## ZUV / Linux 备用方式

            Windows 可下载 `win_start.bat`，Linux 可下载 `linux_start.sh`。启动器下载 `FH-DualSense-Enhanced.zuv.py`，Windows 启动器在需要时安装 `uv`。网络不稳定时，也可以手动下载 ZUV 本体并放到启动器旁边。Linux 独立文件为 `${{ format('FH-DualSense-Enhanced-{0}', needs.prepare.outputs.tag) }}`；内置 EXE 更新只支持 Windows 冻结版本。

            ## 必要设置

            启用 Steam Input 和 DualSense vibration，然后在 Forza Horizon 中开启 Data Out，IP 设为 `127.0.0.1`、端口设为 `5300`。必须关闭 Forza 游戏内振动，否则原生 rumble 会争用并掩盖本项目的握把反馈。先启动 FH-DualSense-Enhanced，再启动游戏。收不到 UDP 时，请在防火墙中允许应用和 UDP 5300；只在短暂排查时关闭防火墙，随后立即恢复。本项目仍不会接管或完整复现菜单、CG 和上车过场的游戏原生振动。

            ---
            > - 设置保存在程序旁边的 `data/user_preferences.json`，更新后继续保留。
            > - Linux 启动器不会安装 udev 规则。HID 权限不足时，请下载 [`70-dualsense.rules`](https://github.com/piereacy/FH-DualSense-Enhanced/blob/main/packaging/linux/70-dualsense.rules)，复制到 `/etc/udev/rules.d/`，重新载入规则后连接手柄。
            > - 预发布频道仍可通过 `uv run FH-DualSense-Enhanced.zuv.py --prerelease` 跟踪。

            ## Enhanced R4 English notes

            Enhanced R4 consolidates the app into one responsive desktop interface and one canonical Windows executable. The Driving Feedback page now scrolls and rearranges responsively for common display scales and window sizes. Mouse-wheel input follows the scroll area under the pointer and transfers to the outer container only after an inner area reaches its boundary. About and licenses is now a dedicated page below Logs instead of being embedded in Grip Haptics. The non-functional R4 workspace card was removed, and the window title plus Windows file description now use only `FH-DualSense-Enhanced`.

            The `Default` profile now autosaves and persists across restarts. Window close, tray quit, game close, and update restart share one exit path. If profile-scoped values in `Default` changed during the session, the app can save them as a named profile with `profile1`, `profile2`, and so on prefilled, or exit without creating a named profile. Factory reset preserves named profiles, resets profile and system settings, re-detects the Windows display language, and returns to `Default`. First launch also selects a supported system language automatically, while later manual language choices remain available.

            A white update dot appears beside System and Updates while a release is available, downloading, verifying, ready to install, or associated with an update error. Opening the page does not dismiss it. The built-in updater accepts only the canonical `${{ format('FH-DualSense-Enhanced-{0}.exe', needs.prepare.outputs.tag) }}` asset and its SHA-256 file. It supports background download, visible progress, user-confirmed restart installation, replacement by a separate helper after the main process exits, and `.old` rollback if replacement fails. ZUV remains optional for the standalone Windows EXE.

            Grip redline feedback now uses a nonlinear perceptual gain curve, with a default peak of `220/255`, a `45%` low-frequency ratio, a `70%` pulse width, and an adjustable entry impact. R2-trigger redline feedback is disabled by default, grip redline feedback is enabled by default on the left grip, and the optional grip gear-shift thump remains disabled by default.

            New experimental trigger effects are all disabled by default: turbo-boost R2-trigger resistance, lateral and longitudinal G-force R2-trigger resistance, independent L2/R2 collision jolts, and road or rumble-strip texture while a trigger is released. Their switches and tuning values are grouped under the collapsed Experimental features area. The tachometer lightbar and gear Player LEDs are also opt-in. Collision detection is shared by trigger and grip effects so the same telemetry frame is not classified twice.

            USB and Bluetooth continue to use the same left/right PCM semantics. The Bluetooth `0x36` path adds a soft limiter and error-feedback int8 quantization to preserve more low-level road detail and layered transients. Lightbar and Player LED state is carried through USB, Bluetooth `0x31`, and the Bluetooth HD haptics `0x36` state block. If a connection rejects `0x36`, the app still falls back to compatible rumble without disabling adaptive triggers.

            Enhanced R4 is based on Forza-Horizon-DualSense-Python 1.6.2, references HorizonHaptics 1.3.0, and uses vDS 0.3.0-rc7 plus DS5Dongle as Bluetooth HD haptics protocol references. Historical Enhanced R1 used `1.6.2.post1`; Enhanced R2 and later use the independent R-series version scheme.

            ## Windows standalone EXE (recommended)

            Download `${{ format('FH-DualSense-Enhanced-{0}.exe', needs.prepare.outputs.tag) }}`. It includes Python and all runtime dependencies, so BAT, ZUV, uv, and a local Python installation are not required. The matching `.sha256` remains attached to the Release for the built-in updater; users launching the EXE manually do not need to download it separately.

            ## ZUV / Linux fallback

            Windows users may download `win_start.bat`, and Linux users may download `linux_start.sh`. The launchers fetch `FH-DualSense-Enhanced.zuv.py`; the Windows launcher installs `uv` when required. On an unreliable connection, place a manually downloaded ZUV file next to the launcher. The standalone Linux asset is `${{ format('FH-DualSense-Enhanced-{0}', needs.prepare.outputs.tag) }}`. Built-in executable replacement is available only in the frozen Windows build.

            ## Required settings

            Keep Steam Input and DualSense vibration enabled. In Forza Horizon, enable Data Out, set IP to `127.0.0.1`, and set port to `5300`. You must disable in-game vibration in Forza, otherwise native rumble can compete with or mask this project's grip feedback. Start FH-DualSense-Enhanced before starting the game. If UDP packets do not arrive, allow the app and UDP 5300 through Windows Firewall. Disable the firewall only for brief diagnosis and restore it immediately afterward. The project still does not capture or fully reproduce native vibration from menus, cutscenes, or vehicle-entry sequences.

            ---
            > - Settings are stored in `data/user_preferences.json` beside the executable and remain across updates.
            > - The Linux launcher does not install udev rules. If HID access is denied, download [`70-dualsense.rules`](https://github.com/piereacy/FH-DualSense-Enhanced/blob/main/packaging/linux/70-dualsense.rules), copy it to `/etc/udev/rules.d/`, reload the rules, and reconnect the controller.
            > - The preview channel remains available through `uv run FH-DualSense-Enhanced.zuv.py --prerelease`.
          files: release/*

