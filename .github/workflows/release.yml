name: release

# Triggers:
#   - tag vX.Y.Z                              -> stable vX.Y.Z
#   - commit msg contains "release vX.Y.Z"    -> stable vX.Y.Z
#   - commit msg contains "prerelease"        -> prerelease at (latest stable + patch)
#   - manual workflow_dispatch                -> prerelease at (latest stable + patch)

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # MARK: parse trigger + move rolling tag --------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse.outputs.tag }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
      title: ${{ steps.parse.outputs.title }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Parse trigger
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag=""; prerelease=""; title=""
          msg=$(git log -1 --pretty=%s)

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # tag push -> stable
            tag="${GITHUB_REF#refs/tags/}"; prerelease=false; title="$tag"
          elif [[ "$msg" =~ release[[:space:]]+(v[0-9]+\.[0-9]+\.[0-9]+) ]]; then
            # explicit "release vX.Y.Z" commit -> stable
            tag="${BASH_REMATCH[1]}"; prerelease=false; title="$tag"
          elif [[ "$msg" == *prerelease* || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # prerelease -> next patch above the latest published stable release
            base=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" -q .tag_name 2>/dev/null || true)
            base="${base:-v0.0.0}"
            IFS='.' read -r maj min pat <<< "${base#v}"
            tag="v${maj}.${min}.$((pat + 1))"
            prerelease=true; title="🧪 ${tag} - Prerelease"
          fi

          echo "tag=$tag"               >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "title=$title"           >> "$GITHUB_OUTPUT"

      - name: Move rolling tag
        if: steps.parse.outputs.tag && steps.parse.outputs.prerelease == 'true'
        env:
          TAG: ${{ steps.parse.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

  # MARK: zuv bundle ------------------------------------------------------
  bundle:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build zuv bundle
        run: |
          mkdir -p release
          uvx zuv build src -o release/fhds.zuv.py \
            --update-repo HamzaYslmn/Forza-Horizon-DualSense-Python
          cp win_start.bat linux_start.sh docs/THIRD_PARTY_NOTICES.md release/

      - uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: release/

  # MARK: Windows standalone EXE -----------------------------------------
  exe:
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build FH-DualSense.exe
        shell: pwsh
        run: |
          uvx --from "pyinstaller>=6.11.1" `
              --with customtkinter --with textual `
              --with hidapi --with psutil --with dotenv `
              --with pystray --with pillow `
              --with numpy --with sounddevice `
              pyinstaller "$Env:GITHUB_WORKSPACE\packaging\windows\fhds.spec" `
              --distpath "$Env:GITHUB_WORKSPACE\packaging\windows\dist" `
              --workpath "$Env:GITHUB_WORKSPACE\packaging\windows\build" `
              --noconfirm --clean

      - name: Rename EXE with version
        shell: pwsh
        run: |
          $tag = "${{ needs.prepare.outputs.tag }}"
          $dest = "packaging\windows\dist\FH-DualSense-$tag.exe"
          Move-Item -Force "packaging\windows\dist\FH-DualSense.exe" $dest
          Write-Host "Built $dest"

      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: packaging/windows/dist/FH-DualSense-*.exe

  # MARK: Linux standalone ELF -------------------------------------------
  elf:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      # AppIndicator/GTK so the pystray tray works in the frozen build.
      - name: Install system tray libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-ayatanaappindicator3-0.1 \
            python3-gi gir1.2-gtk-3.0 libportaudio2

      - name: Build FH-DualSense (ELF)
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          uvx --from "pyinstaller>=6.11.1" \
              --with customtkinter --with textual \
              --with hidapi --with psutil --with dotenv \
              --with pystray --with pillow \
              --with numpy --with sounddevice \
              pyinstaller "$GITHUB_WORKSPACE/packaging/linux/fhds.spec" \
              --distpath "$GITHUB_WORKSPACE/packaging/linux/dist" \
              --workpath "$GITHUB_WORKSPACE/packaging/linux/build" \
              --noconfirm --clean
          mv "$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense" \
             "$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense-$tag"
          echo "Built packaging/linux/dist/FH-DualSense-$tag"

      - uses: actions/upload-artifact@v4
        with:
          name: elf
          path: packaging/linux/dist/FH-DualSense-v*

  # MARK: combined release -----------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [prepare, bundle, exe, elf]
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bundle
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: exe
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: elf
          path: release/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.title }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## ✅ Recommended: launcher scripts

            Download **`win_start.bat`** (Windows) or **`linux_start.sh`** (Linux), drop it in any folder, and double-click. The launcher fetches `fhds.zuv.py`, installs `uv` if needed, runs the app, and self-updates on every launch. This is the supported path and works the same across all Windows versions.

            ## 🧪 Experimental: standalone binaries

            `FH-DualSense.exe` (Windows) and `FH-DualSense-vX.Y.Z` (Linux) are one-file GUI builds (no install, MEIPASS auto-cleans on exit). They are **experimental** and do **not** self-update. The Linux binary is built on Ubuntu, so very old or very different distros may need the launcher instead. Prefer the launcher scripts unless you specifically can't run them.

            ---
            > **Heads up**
            > - The bundle self-updates each run from this release. Keep `fhds.zuv.py` next to your launcher script.
            > - Settings live in `data/user_preferences.json` next to the launcher and survive updates.
            > - Linux: launcher offers to install `70-dualsense.rules` to `/etc/udev/rules.d/` once.
            > - Prerelease channel: run `uv run fhds.zuv.py --prerelease` to track rolling test builds.
          files: release/*

