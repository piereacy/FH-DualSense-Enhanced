name: release

# Triggers:
#   - tag RN or commit msg contains "release RN" -> stable R-series release
#   - tag vX.Y.Z or vX.Y.Z.postN                  -> legacy stable release
#   - legacy "release vX.Y.Z[.postN]" commits     -> legacy stable release
#   - commit msg contains "prerelease" or manual dispatch -> rolling RN-preview

on:
  push:
    branches: [main, dev]
    tags: ["R*", "v*.*.*"]
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish
        required: true
        default: preview
        type: choice
        options:
          - preview
          - stable

permissions:
  contents: write

jobs:
  # MARK: parse trigger + move rolling tag --------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse.outputs.tag }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
      title: ${{ steps.parse.outputs.title }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Parse trigger
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          set -e
          tag=""; prerelease=""; title=""
          msg=$(git log -1 --pretty=%s)
          internal=$(sed -n 's/^version = "\([^"]*\)"/\1/p' src/pyproject.toml | head -1)
          if [[ ! "$internal" =~ ^[0-9]+$ ]]; then
            echo "Expected a numeric internal project version, got: $internal" >&2
            exit 1
          fi
          release="R$internal"

          if [[ "$GITHUB_REF" =~ ^refs/tags/(R[0-9]+)$ ]]; then
            # R-series tag push -> stable
            tag="${BASH_REMATCH[1]}"; prerelease=false
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # legacy tag push -> stable
            tag="${GITHUB_REF#refs/tags/}"; prerelease=false; title="$tag"
          elif [[ "$msg" =~ release[[:space:]]+(R[0-9]+) ]]; then
            # explicit R-series stable release commit
            tag="${BASH_REMATCH[1]}"; prerelease=false
          elif [[ "$msg" =~ release[[:space:]]+(v[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?) ]]; then
            # explicit legacy stable release commit
            tag="${BASH_REMATCH[1]}"; prerelease=false; title="$tag"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "$RELEASE_CHANNEL" == "stable" ]]; then
            # explicit manual recovery path when repository push events are unavailable
            tag="$release"; prerelease=false
          elif [[ "$msg" == *prerelease* || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # rolling prerelease for the current R-series version
            tag="${release}-preview"
            prerelease=true; title="FH-DualSense-Enhanced ${release} Preview"
          fi

          if [[ "$tag" =~ ^R([0-9]+)(-preview)?$ ]]; then
            requested="${BASH_REMATCH[1]}"
            if [[ "$requested" != "$internal" ]]; then
              echo "Refusing $tag: src/pyproject.toml declares R$internal" >&2
              exit 1
            fi
            if ! grep -Fq "## Enhanced R$internal 中文说明" .github/workflows/release.yml \
              || ! grep -Fq "## Enhanced R$internal English notes" .github/workflows/release.yml; then
              echo "Refusing $tag: bilingual release notes are not prepared for R$internal" >&2
              exit 1
            fi
          fi

          if [[ "$tag" =~ ^R[0-9]+$ ]]; then
            title="FH-DualSense-Enhanced $tag"
          elif [[ "$tag" == "v1.6.2.post1" ]]; then
            title="FH-DualSense-Enhanced 1.6.2 Enhanced R1"
          elif [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\.post([0-9]+)$ ]]; then
            title="FH-DualSense-Enhanced ${BASH_REMATCH[1]} Enhanced R${BASH_REMATCH[2]}"
          fi

          echo "tag=$tag"               >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "title=$title"           >> "$GITHUB_OUTPUT"

      - name: Move rolling tag
        if: steps.parse.outputs.tag && steps.parse.outputs.prerelease == 'true'
        env:
          TAG: ${{ steps.parse.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

  # MARK: zuv bundle ------------------------------------------------------
  bundle:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build zuv bundle
        run: |
          mkdir -p release
          uvx --from "zuv==0.5.6" zuv build src -o release/FH-DualSense-Enhanced.zuv.py \
            --update-repo "$GITHUB_REPOSITORY"
          cp win_start.bat linux_start.sh LICENSE docs/THIRD_PARTY_NOTICES.md release/

      - uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: release/

  # MARK: Windows standalone EXE -----------------------------------------
  exe:
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build FH-DualSense-Enhanced EXE
        shell: pwsh
        run: |
          & "$Env:GITHUB_WORKSPACE\packaging\windows\build_exe.bat"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify EXE checksum sidecar
        shell: pwsh
        run: |
          $files = @(Get-ChildItem "$Env:GITHUB_WORKSPACE\packaging\windows\dist\FH-DualSense-Enhanced-R*.exe")
          if ($files.Count -ne 1) { throw "Expected one canonical R-series EXE, found $($files.Count)" }
          uv run --no-project python "$Env:GITHUB_WORKSPACE\packaging\windows\write_sha256.py" --check $files[0].FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: |
            packaging/windows/dist/FH-DualSense-Enhanced-*.exe
            packaging/windows/dist/FH-DualSense-Enhanced-*.exe.sha256

  # MARK: Linux standalone ELF -------------------------------------------
  elf:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      # AppIndicator/GTK so the pystray tray works in the frozen build.
      - name: Install system tray libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-ayatanaappindicator3-0.1 \
            python3-gi gir1.2-gtk-3.0 libportaudio2

      - name: Build FH-DualSense-Enhanced (ELF)
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          internal=$(sed -n 's/^version = "\([^"]*\)"/\1/p' src/pyproject.toml | head -1)
          bash "$GITHUB_WORKSPACE/packaging/linux/build_elf.sh"
          built="$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense-Enhanced-R$internal"
          target="$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense-Enhanced-$tag"
          if [[ "$built" != "$target" ]]; then
            mv "$built" "$target"
          fi
          echo "Built packaging/linux/dist/FH-DualSense-Enhanced-$tag"

      - uses: actions/upload-artifact@v4
        with:
          name: elf
          path: packaging/linux/dist/FH-DualSense-Enhanced-*

  # MARK: combined release -----------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [prepare, bundle, exe, elf]
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bundle
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: exe
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: elf
          path: release/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.title }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## Enhanced R7 中文说明

            Enhanced R7 相比上一稳定版 Enhanced R6，重点改进控制器连接真值、Bluetooth/Xbox App 输入可靠性、动态红线、高 DPI 显示和内置更新器。项目仍基于 `Forza-Horizon-DualSense-Python 1.6.2`，握把触觉参考 `HorizonHaptics 1.3.0`，Bluetooth HD haptics 协议参考 vDS `0.3.0-rc7` 与 DS5Dongle。

            控制器在线、USB/Bluetooth 传输方式、电量和充电状态现在只由完整有效的输入报告确认，不再把残留 HID handle 当成“已连接”。同一手柄的 USB/Bluetooth 拓扑会持续轻量检测并优先 USB；自动重连默认开启，“立即重新连接”也能恢复意外停止的 HID worker。Bluetooth 转 USB 会先等待 Windows 的 DualSense USB 音频端点就绪，再使用已验证的 R6 USB 音频生命周期接管握把。短暂 Bluetooth 信号波动不会再把当前连接永久降级为 compatible rumble；只有真实 `0x36` 构建、队列或 HID write 失败才会回退。当前交接设计下，拔掉 USB 可能使手柄关机，按 PS 键重新开机即可。

            Xbox App 连接桥现在优先清空 Bluetooth HID 输入积压并只转发最新有效状态；同轮 `0x36` 已携带扳机键和灯效时会合并重复写入。100 ms 输入空档只发送一次中立状态并保留同一个虚拟 Xbox 360 Controller 与玩家槽位，不再因短时空档移除设备。物理 HID 与 ViGEm 会话遇到瞬时异常会按有界退避自动恢复，跨会话 `runtime.log` 可用于诊断长时间运行后不认手柄。Steam 模式仍不会创建虚拟手柄，也不会安装或配置 HidHide。

            动态红线估计器会先预测车辆红线，再从同挡位多次确认的真实断油事件学习和修正阈值，同时排除换挡、离合和严重打滑。R2 扳机键红线与握把红线共用该结果，改善仪表红区很宽、固定比例无法触发的车辆。配置页新增内置 `Original`，保留上游 1.6.2 扳机默认并启用 Enhanced 握把触觉；社区 `Default` 仍是默认选择，ABS 振动默认关闭。扳机反馈与握把触觉分成独立页面，灯效页不再显示握把设置。

            Windows 界面现在在创建窗口前启用 Per-Monitor v2 DPI awareness，并使用系统字体与像素对齐的顶部状态框，改善 100%、125% 和 150% 缩放下的文字与边缘清晰度。长页面、响应式卡片和周期状态采用合并更新，减少最大化和跨页切换时的重复布局。内置更新器改为事务式并排安装：R7 以后使用规范版本文件名，不再创建 `.exe.old`；新版本健康启动后迁移现有快捷方式，清理同目录更旧的规范 EXE、对应 `.old` 和 `.sha256`，失败时保留仍被快捷方式引用的旧版本并支持启动恢复或回滚。FH6 DualSense 图标功能继续感谢 MOD 作者 [@hotline1337](https://github.com/hotline1337) 授权，来源见 [Nexus Mods MOD 页面](https://www.nexusmods.com/forzahorizon6/mods/2)。

            ## Windows 独立 EXE（推荐）

            下载：`${{ format('FH-DualSense-Enhanced-{0}.exe', needs.prepare.outputs.tag) }}`

            EXE 已包含 Python 和全部依赖，不需要 BAT、ZUV、uv 或本机 Python。请把对应 `.sha256` 文件留在 Release 中供内置更新器校验；用户手动启动 EXE 时不需要同时下载 `.sha256`。

            ## ZUV / Linux 备用方式

            Windows 可下载 `win_start.bat`，Linux 可下载 `linux_start.sh`。启动器下载 `FH-DualSense-Enhanced.zuv.py`，Windows 启动器在需要时安装 `uv`。网络不稳定时，也可以手动下载 ZUV 本体并放到启动器旁边。Linux 独立文件为 `${{ format('FH-DualSense-Enhanced-{0}', needs.prepare.outputs.tag) }}`；内置 EXE 更新只支持 Windows 冻结版本。

            ## 必要设置

            Steam 版保持 Steam Input 与 DualSense vibration 开启；Xbox App 版在软件中选择 Xbox App，不要同时运行 Steam Input 或 DS4Windows 接管同一手柄。所有平台都要在 Forza Horizon 中开启 Data Out，IP 设为 `127.0.0.1`、端口设为 `5300`，并关闭游戏内振动，否则原生 rumble 会争用并掩盖本项目的握把反馈。收不到 UDP 时，请在防火墙中允许应用和 UDP 5300。

            ---
            > - 设置保存在程序旁边的 `data/user_preferences.json`，更新后继续保留。
            > - Linux 启动器不会安装 udev 规则。HID 权限不足时，请下载 [`70-dualsense.rules`](https://github.com/piereacy/FH-DualSense-Enhanced/blob/main/packaging/linux/70-dualsense.rules)，复制到 `/etc/udev/rules.d/`，重新载入规则后连接手柄。
            > - 预发布频道仍可通过 `uv run FH-DualSense-Enhanced.zuv.py --prerelease` 跟踪。

            ## Enhanced R7 English notes

            Compared with the previous stable Enhanced R6, Enhanced R7 focuses on truthful controller state, Bluetooth/Xbox App input reliability, dynamic redline detection, high-DPI rendering, and transactional updates. It remains based on `Forza-Horizon-DualSense-Python 1.6.2`, with grip haptics informed by `HorizonHaptics 1.3.0` and Bluetooth HD haptics informed by vDS `0.3.0-rc7` plus DS5Dongle.

            Connected state, USB/Bluetooth transport, battery level, and charging state are now established only by complete valid input reports instead of a leftover HID handle. Lightweight topology monitoring follows the same controller across USB and Bluetooth and prefers USB. Automatic reconnect is enabled by default, and Reconnect Now can revive an unexpectedly stopped HID worker. Bluetooth-to-USB waits for the Windows DualSense USB audio endpoint before handing grip haptics to the verified R6 USB audio lifecycle. A temporary Bluetooth signal gap no longer permanently downgrades the connection to compatible rumble; fallback now requires an actual `0x36` build, queue, or HID write failure. With the current handover design, unplugging USB can power the controller off; press the PS button to reconnect.

            Xbox App bridge mode now drains Bluetooth HID input backlog first and forwards only the newest valid state. Redundant writes are coalesced when the same `0x36` report already carries trigger and lighting state. A 100 ms input gap sends one neutral state but retains the same virtual Xbox 360 Controller and player slot instead of removing the device. Physical HID and ViGEm sessions recover from transient failures with bounded backoff, while a persistent `runtime.log` helps diagnose controllers that stop responding during long sessions. Steam mode still creates no virtual controller and the app neither installs nor configures HidHide.

            The dynamic redline estimator starts with a prediction and then learns from repeated, same-gear limiter events while excluding shifts, clutch use, and severe wheel slip. R2 trigger redline feedback and grip redline feedback share the learned result, improving cars whose wide dashboard red zone never worked with one fixed ratio. Profiles now include a built-in `Original` preset with upstream 1.6.2 trigger defaults plus Enhanced grip haptics. Community `Default` remains selected by default, with ABS vibration disabled. Trigger feedback and grip haptics have separate pages, and the lighting page no longer exposes grip settings.

            Windows now enables Per-Monitor v2 DPI awareness before creating any UI and uses system fonts with pixel-aligned header status frames, improving text and edge clarity at 100%, 125%, and 150% scaling. Long pages, responsive cards, and periodic status rendering coalesce repeated layout work to reduce maximize and navigation stalls. The updater now performs transactional side-by-side installation. R7 and later use canonical versioned filenames without creating `.exe.old`; after a healthy launch it migrates matching shortcuts and removes older canonical EXEs plus their matching `.old` and `.sha256` files. Interrupted or partially failed updates retain needed old versions and can recover or roll back on the next start. The FH6 DualSense icon utility continues to credit MOD author [@hotline1337](https://github.com/hotline1337), who granted permission; source: [Nexus Mods MOD page](https://www.nexusmods.com/forzahorizon6/mods/2).

            ## Windows standalone EXE (recommended)

            Download `${{ format('FH-DualSense-Enhanced-{0}.exe', needs.prepare.outputs.tag) }}`. It includes Python and all runtime dependencies, so BAT, ZUV, uv, and a local Python installation are not required. The matching `.sha256` remains attached to the Release for the built-in updater; users launching the EXE manually do not need to download it separately.

            ## ZUV / Linux fallback

            Windows users may download `win_start.bat`, and Linux users may download `linux_start.sh`. The launchers fetch `FH-DualSense-Enhanced.zuv.py`; the Windows launcher installs `uv` when required. On an unreliable connection, place a manually downloaded ZUV file next to the launcher. The standalone Linux asset is `${{ format('FH-DualSense-Enhanced-{0}', needs.prepare.outputs.tag) }}`. Built-in executable replacement is available only in the frozen Windows build.

            ## Required settings

            For Steam, keep Steam Input and DualSense vibration enabled. For Xbox App, select Xbox App inside FH-DualSense-Enhanced and do not let Steam Input or DS4Windows claim the same controller. On every platform, enable Forza Data Out at `127.0.0.1:5300` and disable in-game vibration, otherwise native rumble can compete with or mask this project's grip feedback. Allow the app and UDP 5300 through Windows Firewall if packets do not arrive.

            ---
            > - Settings are stored in `data/user_preferences.json` beside the executable and remain across updates.
            > - The Linux launcher does not install udev rules. If HID access is denied, download [`70-dualsense.rules`](https://github.com/piereacy/FH-DualSense-Enhanced/blob/main/packaging/linux/70-dualsense.rules), copy it to `/etc/udev/rules.d/`, reload the rules, and reconnect the controller.
            > - The preview channel remains available through `uv run FH-DualSense-Enhanced.zuv.py --prerelease`.
          files: release/*

