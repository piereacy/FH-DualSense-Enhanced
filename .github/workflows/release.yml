name: release

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  # Rolling prerelease tag re-uploaded on every push to `dev`. The tag itself
  # is just `dev` (not a version number); the bundle inside still carries the
  # real version from pyproject.toml. `--prerelease` users auto-track it.
  DEV_TAG: dev

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse trigger
        id: parse
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$GITHUB_REF" == "refs/heads/dev" ]]; then
            echo "tag=${DEV_TAG}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          msg=$(git log -1 --pretty=%s)
          if [[ "$msg" =~ ^(release|prerelease)[[:space:]]+(v[0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "tag=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            echo "prerelease=$([[ ${BASH_REMATCH[1]} == prerelease ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          fi

      - name: Move tag
        if: steps.parse.outputs.tag
        env:
          TAG: ${{ steps.parse.outputs.tag }}
          PRERELEASE: ${{ steps.parse.outputs.prerelease }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1 && [[ "$PRERELEASE" != "true" ]]; then
            echo "Stable tag $TAG exists; skipping." && echo "skip=1" >> "$GITHUB_ENV" && exit 0
          fi
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - uses: astral-sh/setup-uv@v5
        if: steps.parse.outputs.tag && env.skip != '1'

      - name: Build and release
        if: steps.parse.outputs.tag && env.skip != '1'
        run: |
          mkdir -p release
          uvx zuv build src -o release/fhds.zuv.py \
            --update-repo HamzaYslmn/Forza-Horizon-DualSense-Python
          cp win_start.bat linux_start.sh packaging/linux/70-dualsense.rules release/

      - uses: softprops/action-gh-release@v2
        if: steps.parse.outputs.tag && env.skip != '1'
        with:
          tag_name: ${{ steps.parse.outputs.tag }}
          name: ${{ steps.parse.outputs.tag }}
          prerelease: ${{ steps.parse.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            > **Heads up**
            > - The bundle self-updates each run from this release. Keep `fhds.zuv.py` next to your launcher script.
            > - Settings live in `data/user_preferences.json` next to the launcher and survive updates.
            > - Linux: drop `70-dualsense.rules` into `/etc/udev/rules.d/` once (the launcher offers to do this).
            > - Prerelease channel: run `uv run fhds.zuv.py --prerelease` to track rolling test builds.
          files: release/*

