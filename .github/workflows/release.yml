name: release

# Triggers:
#   - tag RN or commit msg contains "release RN" -> stable R-series release
#   - tag vX.Y.Z or vX.Y.Z.postN                  -> legacy stable release
#   - legacy "release vX.Y.Z[.postN]" commits     -> legacy stable release
#   - commit msg contains "prerelease" or manual dispatch -> rolling RN-preview

on:
  push:
    branches: [main, dev]
    tags: ["R*", "v*.*.*"]
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish
        required: true
        default: preview
        type: choice
        options:
          - preview
          - stable

permissions:
  contents: write

jobs:
  # MARK: parse trigger + move rolling tag --------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse.outputs.tag }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
      title: ${{ steps.parse.outputs.title }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Parse trigger
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          set -e
          tag=""; prerelease=""; title=""
          msg=$(git log -1 --pretty=%s)
          internal=$(sed -n 's/^version = "\([^"]*\)"/\1/p' src/pyproject.toml | head -1)
          if [[ ! "$internal" =~ ^[0-9]+$ ]]; then
            echo "Expected a numeric internal project version, got: $internal" >&2
            exit 1
          fi
          release="R$internal"

          if [[ "$GITHUB_REF" =~ ^refs/tags/(R[0-9]+)$ ]]; then
            # R-series tag push -> stable
            tag="${BASH_REMATCH[1]}"; prerelease=false
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # legacy tag push -> stable
            tag="${GITHUB_REF#refs/tags/}"; prerelease=false; title="$tag"
          elif [[ "$msg" =~ release[[:space:]]+(R[0-9]+) ]]; then
            # explicit R-series stable release commit
            tag="${BASH_REMATCH[1]}"; prerelease=false
          elif [[ "$msg" =~ release[[:space:]]+(v[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?) ]]; then
            # explicit legacy stable release commit
            tag="${BASH_REMATCH[1]}"; prerelease=false; title="$tag"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "$RELEASE_CHANNEL" == "stable" ]]; then
            # explicit manual recovery path when repository push events are unavailable
            tag="$release"; prerelease=false
          elif [[ "$msg" == *prerelease* || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # rolling prerelease for the current R-series version
            tag="${release}-preview"
            prerelease=true; title="FH-DualSense-Enhanced ${release} Preview"
          fi

          if [[ "$tag" =~ ^R[0-9]+$ ]]; then
            title="FH-DualSense-Enhanced $tag"
          elif [[ "$tag" == "v1.6.2.post1" ]]; then
            title="FH-DualSense-Enhanced 1.6.2 Enhanced R1"
          elif [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\.post([0-9]+)$ ]]; then
            title="FH-DualSense-Enhanced ${BASH_REMATCH[1]} Enhanced R${BASH_REMATCH[2]}"
          fi

          echo "tag=$tag"               >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "title=$title"           >> "$GITHUB_OUTPUT"

      - name: Move rolling tag
        if: steps.parse.outputs.tag && steps.parse.outputs.prerelease == 'true'
        env:
          TAG: ${{ steps.parse.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

  # MARK: zuv bundle ------------------------------------------------------
  bundle:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build zuv bundle
        run: |
          mkdir -p release
          uvx zuv build src -o release/FH-DualSense-Enhanced.zuv.py \
            --update-repo "$GITHUB_REPOSITORY"
          cp win_start.bat linux_start.sh LICENSE docs/THIRD_PARTY_NOTICES.md release/

      - uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: release/

  # MARK: Windows standalone EXE -----------------------------------------
  exe:
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build FH-DualSense-Enhanced EXE
        shell: pwsh
        run: |
          & "$Env:GITHUB_WORKSPACE\packaging\windows\build_exe.bat"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify EXE checksum sidecar
        shell: pwsh
        run: |
          $files = @(Get-ChildItem "$Env:GITHUB_WORKSPACE\packaging\windows\dist\FH-DualSense-Enhanced-R*.exe")
          if ($files.Count -ne 1) { throw "Expected one canonical R-series EXE, found $($files.Count)" }
          uv run --no-project python "$Env:GITHUB_WORKSPACE\packaging\windows\write_sha256.py" --check $files[0].FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: |
            packaging/windows/dist/FH-DualSense-Enhanced-*.exe
            packaging/windows/dist/FH-DualSense-Enhanced-*.exe.sha256

  # MARK: Linux standalone ELF -------------------------------------------
  elf:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      # AppIndicator/GTK so the pystray tray works in the frozen build.
      - name: Install system tray libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-ayatanaappindicator3-0.1 \
            python3-gi gir1.2-gtk-3.0 libportaudio2

      - name: Build FH-DualSense-Enhanced (ELF)
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          uvx --from "pyinstaller>=6.11.1" \
              --with customtkinter --with textual \
              --with hidapi --with psutil --with dotenv \
              --with pystray --with pillow \
              --with numpy --with sounddevice \
              pyinstaller "$GITHUB_WORKSPACE/packaging/linux/fhds.spec" \
              --distpath "$GITHUB_WORKSPACE/packaging/linux/dist" \
              --workpath "$GITHUB_WORKSPACE/packaging/linux/build" \
              --noconfirm --clean
          mv "$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense-Enhanced" \
             "$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense-Enhanced-$tag"
          echo "Built packaging/linux/dist/FH-DualSense-Enhanced-$tag"

      - uses: actions/upload-artifact@v4
        with:
          name: elf
          path: packaging/linux/dist/FH-DualSense-Enhanced-*

  # MARK: combined release -----------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [prepare, bundle, exe, elf]
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bundle
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: exe
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: elf
          path: release/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.title }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## Enhanced R5 中文说明

            Enhanced R5 相比上一稳定版 Enhanced R4，首先补全了总览页的实时状态链路。DualSense 卡片会区分 USB、Bluetooth、等待重连、关闭自动重连、DSX 单向 UDP 和后端错误；Forza 遥测卡片会区分等待数据、持续接收、数据中断和 UDP 绑定失败，并显示数据包来源、计数或最后接收时间。当前配置不再使用 `-` 占位，更新卡片会显示自动检查等待、检查关闭、检查中、已是最新、发现新版本、下载百分比、校验、待安装、安装中和错误。总览在页面创建后立即刷新，并在运行期间每秒刷新。

            总览快速入口还新增“启动 FH6”按钮。程序会复用 Windows Steam FH6 安装发现，只有在确认安装有效且游戏尚未运行时才启用按钮；点击后通过 `steam://run/2483190` 交给 Steam 启动，以保留 Steam Input 和 Steam 启动上下文。按钮会区分正在查找、可以启动、正在启动、游戏运行中和未找到游戏，并在 FH6 已运行时保持禁用。程序不会自动启动游戏，也不会因为启动按钮而交换语言包或修改 Steam/游戏设置。

            本版同时换用新的水墨风 DualSense 赛车图标。窗口标题栏、系统托盘、Windows 独立 EXE 与内置更新 Helper 共用同一套 PNG/多尺寸 ICO 资产。

            “系统与更新”新增 Windows Steam 版 FH6 的“中文文字 + 英文语音”按钮功能。程序会从 Steam 注册表、`libraryfolders.vdf`、App ID `2483190` 的 manifest、卸载信息和正在运行的 `ForzaHorizon6.exe` 查找安装目录，因此不依赖 C 盘；也可以手动选择安装目录。自动流程只会读取路径与状态，绝不会自动改名。

            启用按钮只在确认 `CHS.zip` 为中文、`EN.zip` 为英文且 FH6 已关闭时可用，并要求 Steam 中的 FH6 语言为英文；无法读取 Steam 语言时会要求额外确认，明确检测到其他语言时会阻止操作。用户确认后，程序使用同目录临时名完成三步改名；还原按钮使用相同流程恢复原始名称。若进程中途失败会尝试回滚；若上次崩溃留下临时文件，只显示“需要修复”，必须再次点击按钮确认，程序不会自动修复或删除文件。Steam 更新或验证文件可能恢复原始语言包，之后重新扫描即可重新识别。

            该功能只支持 Windows Steam 版 FH6，不复制语言包、不创建永久备份，也不在游戏运行时改名。使用前请至少运行一次 FH6，并在 Steam 属性中把游戏语言设为 English；修改语言包与 Forza Data Out、手柄触觉设置相互独立。

            Enhanced R5 基于 Forza-Horizon-DualSense-Python 1.6.2，参考 HorizonHaptics 1.3.0，并使用 vDS 0.3.0-rc7 与 DS5Dongle 作为 Bluetooth HD haptics 协议参考。历史 Enhanced R1 使用 `1.6.2.post1`；从 Enhanced R2 起使用独立 R 版本体系。

            ## Windows 独立 EXE（推荐）

            下载：`${{ format('FH-DualSense-Enhanced-{0}.exe', needs.prepare.outputs.tag) }}`

            EXE 已包含 Python 和全部依赖，不需要 BAT、ZUV、uv 或本机 Python。请把对应 `.sha256` 文件留在 Release 中供内置更新器校验；用户手动启动 EXE 时不需要同时下载 `.sha256`。

            ## ZUV / Linux 备用方式

            Windows 可下载 `win_start.bat`，Linux 可下载 `linux_start.sh`。启动器下载 `FH-DualSense-Enhanced.zuv.py`，Windows 启动器在需要时安装 `uv`。网络不稳定时，也可以手动下载 ZUV 本体并放到启动器旁边。Linux 独立文件为 `${{ format('FH-DualSense-Enhanced-{0}', needs.prepare.outputs.tag) }}`；内置 EXE 更新只支持 Windows 冻结版本。

            ## 必要设置

            启用 Steam Input 和 DualSense vibration，然后在 Forza Horizon 中开启 Data Out，IP 设为 `127.0.0.1`、端口设为 `5300`。必须关闭 Forza 游戏内振动，否则原生 rumble 会争用并掩盖本项目的握把反馈。先启动 FH-DualSense-Enhanced，再启动游戏。收不到 UDP 时，请在防火墙中允许应用和 UDP 5300；只在短暂排查时关闭防火墙，随后立即恢复。本项目仍不会接管或完整复现菜单、CG 和上车过场的游戏原生振动。

            ---
            > - 设置保存在程序旁边的 `data/user_preferences.json`，更新后继续保留。
            > - Linux 启动器不会安装 udev 规则。HID 权限不足时，请下载 [`70-dualsense.rules`](https://github.com/piereacy/FH-DualSense-Enhanced/blob/main/packaging/linux/70-dualsense.rules)，复制到 `/etc/udev/rules.d/`，重新载入规则后连接手柄。
            > - 预发布频道仍可通过 `uv run FH-DualSense-Enhanced.zuv.py --prerelease` 跟踪。

            ## Enhanced R5 English notes

            Compared with the previous stable Enhanced R4, Enhanced R5 completes the live status path on the Overview page. The DualSense card distinguishes USB, Bluetooth, reconnect waiting, disabled automatic reconnect, DSX fire-and-forget UDP, and backend errors. The Forza telemetry card distinguishes waiting, active reception, lost data, and UDP bind failure, with packet source, count, or last-received age. The active profile no longer falls back to a `-` placeholder. The update card covers the automatic-check wait, disabled checks, checking, up to date, available, download percentage, verification, ready, installing, and error states. Overview refreshes immediately after construction and once per second while the app runs.

            Overview Quick Access also adds a Launch FH6 button. The app reuses Windows Steam FH6 install discovery and enables the button only when the install is valid and the game is not running. A click delegates launch to Steam through `steam://run/2483190`, preserving Steam Input and the Steam launch context. The button distinguishes discovery, ready, launching, running, and not-found states, and stays disabled while FH6 is running. The app never launches the game automatically, and the launch button does not swap language archives or change Steam/game settings.

            This release also adopts a new ink-wash DualSense racing icon. The title bar, system tray, Windows standalone EXE, and bundled update Helper all use the same PNG and multi-size ICO assets.

            System and Updates now includes an explicit button for Chinese text with English voice in the Windows Steam edition of FH6. Discovery checks Steam registry roots, `libraryfolders.vdf`, the App ID `2483190` manifest, uninstall metadata, and the full path of a running `ForzaHorizon6.exe`, so it does not assume the C drive. A manual install-folder choice is also available. Automatic work is read-only: the app never renames files without a button press and confirmation.

            Enable is available only after CHS.zip is identified as Chinese, EN.zip as English, and FH6 is closed. The FH6 language in Steam must be English. An unknown Steam language requires an extra confirmation, while an explicitly different language blocks the operation. After confirmation, the app performs a three-step rename through a temporary name in the same directory; Restore uses the same process to return the original names. An in-process failure attempts rollback. A temporary file left by a previous crash is only reported as requiring repair, and repair still needs another button press and confirmation. Nothing is repaired or deleted automatically. A Steam update or file verification may restore the original archives, which a later rescan will detect.

            This feature supports only the Windows Steam edition of FH6. It does not copy language archives, create a permanent backup, or rename anything while the game is running. Run FH6 at least once and set its Steam language to English before use. The language archive feature is independent from Forza Data Out and controller haptics settings.

            Enhanced R5 is based on Forza-Horizon-DualSense-Python 1.6.2, references HorizonHaptics 1.3.0, and uses vDS 0.3.0-rc7 plus DS5Dongle as Bluetooth HD haptics protocol references. Historical Enhanced R1 used `1.6.2.post1`; Enhanced R2 and later use the independent R-series version scheme.

            ## Windows standalone EXE (recommended)

            Download `${{ format('FH-DualSense-Enhanced-{0}.exe', needs.prepare.outputs.tag) }}`. It includes Python and all runtime dependencies, so BAT, ZUV, uv, and a local Python installation are not required. The matching `.sha256` remains attached to the Release for the built-in updater; users launching the EXE manually do not need to download it separately.

            ## ZUV / Linux fallback

            Windows users may download `win_start.bat`, and Linux users may download `linux_start.sh`. The launchers fetch `FH-DualSense-Enhanced.zuv.py`; the Windows launcher installs `uv` when required. On an unreliable connection, place a manually downloaded ZUV file next to the launcher. The standalone Linux asset is `${{ format('FH-DualSense-Enhanced-{0}', needs.prepare.outputs.tag) }}`. Built-in executable replacement is available only in the frozen Windows build.

            ## Required settings

            Keep Steam Input and DualSense vibration enabled. In Forza Horizon, enable Data Out, set IP to `127.0.0.1`, and set port to `5300`. You must disable in-game vibration in Forza, otherwise native rumble can compete with or mask this project's grip feedback. Start FH-DualSense-Enhanced before starting the game. If UDP packets do not arrive, allow the app and UDP 5300 through Windows Firewall. Disable the firewall only for brief diagnosis and restore it immediately afterward. The project still does not capture or fully reproduce native vibration from menus, cutscenes, or vehicle-entry sequences.

            ---
            > - Settings are stored in `data/user_preferences.json` beside the executable and remain across updates.
            > - The Linux launcher does not install udev rules. If HID access is denied, download [`70-dualsense.rules`](https://github.com/piereacy/FH-DualSense-Enhanced/blob/main/packaging/linux/70-dualsense.rules), copy it to `/etc/udev/rules.d/`, reload the rules, and reconnect the controller.
            > - The preview channel remains available through `uv run FH-DualSense-Enhanced.zuv.py --prerelease`.
          files: release/*

