name: release

# Triggers:
#   - tag RN or commit msg contains "release RN" -> stable R-series release
#   - tag vX.Y.Z or vX.Y.Z.postN                  -> legacy stable release
#   - legacy "release vX.Y.Z[.postN]" commits     -> legacy stable release
#   - commit msg contains "prerelease" or manual dispatch -> rolling RN-preview

on:
  push:
    branches: [main, dev]
    tags: ["R*", "v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # MARK: parse trigger + move rolling tag --------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse.outputs.tag }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
      title: ${{ steps.parse.outputs.title }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Parse trigger
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag=""; prerelease=""; title=""
          msg=$(git log -1 --pretty=%s)
          internal=$(sed -n 's/^version = "\([^"]*\)"/\1/p' src/pyproject.toml | head -1)
          if [[ ! "$internal" =~ ^[0-9]+$ ]]; then
            echo "Expected a numeric internal project version, got: $internal" >&2
            exit 1
          fi
          release="R$internal"

          if [[ "$GITHUB_REF" =~ ^refs/tags/(R[0-9]+)$ ]]; then
            # R-series tag push -> stable
            tag="${BASH_REMATCH[1]}"; prerelease=false
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # legacy tag push -> stable
            tag="${GITHUB_REF#refs/tags/}"; prerelease=false; title="$tag"
          elif [[ "$msg" =~ release[[:space:]]+(R[0-9]+) ]]; then
            # explicit R-series stable release commit
            tag="${BASH_REMATCH[1]}"; prerelease=false
          elif [[ "$msg" =~ release[[:space:]]+(v[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?) ]]; then
            # explicit legacy stable release commit
            tag="${BASH_REMATCH[1]}"; prerelease=false; title="$tag"
          elif [[ "$msg" == *prerelease* || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # rolling prerelease for the current R-series version
            tag="${release}-preview"
            prerelease=true; title="FH-DualSense-Enhanced ${release} Preview"
          fi

          if [[ "$tag" =~ ^R[0-9]+$ ]]; then
            title="FH-DualSense-Enhanced $tag"
          elif [[ "$tag" == "v1.6.2.post1" ]]; then
            title="FH-DualSense-Enhanced 1.6.2 Enhanced R1"
          elif [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\.post([0-9]+)$ ]]; then
            title="FH-DualSense-Enhanced ${BASH_REMATCH[1]} Enhanced R${BASH_REMATCH[2]}"
          fi

          echo "tag=$tag"               >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "title=$title"           >> "$GITHUB_OUTPUT"

      - name: Move rolling tag
        if: steps.parse.outputs.tag && steps.parse.outputs.prerelease == 'true'
        env:
          TAG: ${{ steps.parse.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

  # MARK: zuv bundle ------------------------------------------------------
  bundle:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build zuv bundle
        run: |
          mkdir -p release
          uvx zuv build src -o release/FH-DualSense-Enhanced.zuv.py \
            --update-repo "$GITHUB_REPOSITORY"
          cp win_start.bat linux_start.sh LICENSE docs/THIRD_PARTY_NOTICES.md release/

      - uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: release/

  # MARK: Windows standalone EXE -----------------------------------------
  exe:
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build FH-DualSense-Enhanced.exe
        shell: pwsh
        run: |
          uvx --from "pyinstaller>=6.11.1" `
              --with customtkinter --with textual `
              --with hidapi --with psutil --with dotenv `
              --with pystray --with pillow `
              --with numpy --with sounddevice `
              pyinstaller "$Env:GITHUB_WORKSPACE\packaging\windows\fhds.spec" `
              --distpath "$Env:GITHUB_WORKSPACE\packaging\windows\dist" `
              --workpath "$Env:GITHUB_WORKSPACE\packaging\windows\build" `
              --noconfirm --clean

      - name: Rename EXE with version
        shell: pwsh
        run: |
          $tag = "${{ needs.prepare.outputs.tag }}"
          $dest = "packaging\windows\dist\FH-DualSense-Enhanced-$tag.exe"
          Move-Item -Force "packaging\windows\dist\FH-DualSense-Enhanced.exe" $dest
          Write-Host "Built $dest"

      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: packaging/windows/dist/FH-DualSense-Enhanced-*.exe

  # MARK: Linux standalone ELF -------------------------------------------
  elf:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      # AppIndicator/GTK so the pystray tray works in the frozen build.
      - name: Install system tray libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-ayatanaappindicator3-0.1 \
            python3-gi gir1.2-gtk-3.0 libportaudio2

      - name: Build FH-DualSense-Enhanced (ELF)
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          uvx --from "pyinstaller>=6.11.1" \
              --with customtkinter --with textual \
              --with hidapi --with psutil --with dotenv \
              --with pystray --with pillow \
              --with numpy --with sounddevice \
              pyinstaller "$GITHUB_WORKSPACE/packaging/linux/fhds.spec" \
              --distpath "$GITHUB_WORKSPACE/packaging/linux/dist" \
              --workpath "$GITHUB_WORKSPACE/packaging/linux/build" \
              --noconfirm --clean
          mv "$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense-Enhanced" \
             "$GITHUB_WORKSPACE/packaging/linux/dist/FH-DualSense-Enhanced-$tag"
          echo "Built packaging/linux/dist/FH-DualSense-Enhanced-$tag"

      - uses: actions/upload-artifact@v4
        with:
          name: elf
          path: packaging/linux/dist/FH-DualSense-Enhanced-*

  # MARK: combined release -----------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [prepare, bundle, exe, elf]
    if: needs.prepare.outputs.tag
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bundle
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: exe
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: elf
          path: release/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.title }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## FH-DualSense-Enhanced

            Enhanced R2 adds telemetry-driven dynamic wheelspin feedback to the R2 trigger and a GT7-style ABS wall to the L2 trigger. Wheelspin uses driven-wheel slip, asymmetric EWMA smoothing, hysteresis, low-speed raw wheel rotation, G-force damping, and material-specific frequency bands for tarmac, puddles, dirt, and gravel. Wheelspin takes priority over the rev limiter so the R2 trigger follows the active traction event.

            R2 also keeps the existing adaptive-trigger and body-haptics mixer for engine, road material, suspension, impacts, puddles, tire slip, wheelspin, and ABS. The new tuning controls are folded under Experimental settings and use reviewed defaults.

            USB and Bluetooth provide broadly similar practical feedback. USB uses the controller audio endpoint for haptics, while Bluetooth uses compatible low and high frequency rumble. Adaptive triggers remain available on both connections.

            R2 starts FH-DualSense-Enhanced's independent R-series versioning to keep the product version concise and avoid implying an official upstream release. It is based on Forza-Horizon-DualSense-Python 1.6.2 and references HorizonHaptics 1.3.0. Historical Enhanced R1 used version 1.6.2.post1.

            ## Recommended: launcher scripts

            Download **`win_start.bat`** on Windows or **`linux_start.sh`** on Linux and run it. The launcher downloads the ZUV application bundle, and the Windows launcher installs `uv` when needed. `uv` then provisions the managed Python runtime. The published ZUV checks this fork's releases for updates.

            If the automatic download is unreliable, use the manual ZUV fallback: download **`FH-DualSense-Enhanced.zuv.py`** from this Release, place it beside the launcher, and run the launcher again.

            ## Standalone binaries

            `${{ format('FH-DualSense-Enhanced-{0}.exe', needs.prepare.outputs.tag) }}` for Windows contains Python and all application dependencies. It can be downloaded and run by itself without BAT, ZUV, uv, or a system Python installation. It does not self-update.

            `${{ format('FH-DualSense-Enhanced-{0}', needs.prepare.outputs.tag) }}` is the standalone Linux build. It is built on Ubuntu, so older or substantially different distributions may need the ZUV launcher instead.

            ## Required setup

            Enable Steam Input and DualSense vibration, then enable Forza Horizon Data Out at `127.0.0.1:5300`. Start FH-DualSense-Enhanced before launching the game. If no UDP packets arrive, allow the application and UDP 5300 through the firewall. Disable the firewall only for a short diagnostic comparison and turn it back on immediately.

            ---
            > **Heads up**
            > - A manually downloaded ZUV can be kept next to the launcher script. The launcher copies it into its managed `app` folder.
            > - Settings live in `data/user_preferences.json` next to the launcher and survive updates.
            > - Linux: the launcher does not install system udev rules. If HID access is denied, download [`70-dualsense.rules`](https://github.com/piereacy/FH-DualSense-Enhanced/blob/main/packaging/linux/70-dualsense.rules), copy it to `/etc/udev/rules.d/`, reload the rules, and reconnect the controller.
            > - Prerelease channel: run `uv run FH-DualSense-Enhanced.zuv.py --prerelease` to track rolling test builds.
          files: release/*

